name: CI

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
# =========================
# TEST JOB
# =========================
  test:
    runs-on: ubuntu-latest
    env:
      PHP_CS_FIXER_IGNORE_ENV: 1

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo_mysql, mbstring, exif, pcntl, bcmath, gd, zip, intl, opcache, redis
          tools: composer:v2

      - uses: actions/cache@v3
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}

      - run: composer install --no-progress --prefer-dist --optimize-autoloader

      - uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - run: npm ci

      - name: Setup Laravel env
        run: |
          echo "APP_ENV=testing" > .env
          echo "APP_KEY=base64:$(openssl rand -base64 32)" >> .env
          echo "DB_CONNECTION=sqlite" >> .env
          echo "DB_DATABASE=:memory:" >> .env

      - run: ./vendor/bin/phpunit

# =========================
# SECURITY SCANS
# =========================
  dependency-check:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: dependency-check/Dependency-Check_Action@main
        continue-on-error: true
        with:
          project: 'smarthr'
          path: '.'

  vulnerability-scan:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'

# =========================
# BUILD & PUSH
# =========================
  build-and-push:
    runs-on: ubuntu-latest
    needs: [test, dependency-check, vulnerability-scan]
    if: github.ref == 'refs/heads/main'
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Compute image tags
        id: meta
        run: |
          REGISTRY=${{ steps.login-ecr.outputs.registry }}
          SHA=${{ github.sha }}

          echo "REGISTRY=$REGISTRY"
          echo "backend=$REGISTRY/smarthr:backend-$SHA"
          echo "web=$REGISTRY/smarthr:web-$SHA"
          echo "redis=$REGISTRY/smarthr:redis-$SHA"

          echo "backend=$REGISTRY/smarthr:backend-$SHA" >> $GITHUB_OUTPUT
          echo "web=$REGISTRY/smarthr:web-$SHA" >> $GITHUB_OUTPUT
          echo "redis=$REGISTRY/smarthr:redis-$SHA" >> $GITHUB_OUTPUT

      - uses: docker/setup-buildx-action@v3

      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfiles/app/backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.backend }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push web
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfiles/web/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.web }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push redis
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfiles/cache/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.redis }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

# =========================
# DEPLOY
# =========================
  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Recompute image tags (bulletproof)
        id: meta
        run: |
          REGISTRY=${{ steps.login-ecr.outputs.registry }}
          SHA=${{ github.sha }}

          echo "backend=$REGISTRY/smarthr:backend-$SHA" >> $GITHUB_OUTPUT
          echo "web=$REGISTRY/smarthr:web-$SHA" >> $GITHUB_OUTPUT
          echo "redis=$REGISTRY/smarthr:redis-$SHA" >> $GITHUB_OUTPUT

      - name: Inject backend image
        id: render-backend
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: smarthr-taskdef-app-revision2.json
          container-name: backend
          image: ${{ steps.meta.outputs.backend }}

      - name: Inject web image
        id: render-app
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: ${{ steps.render-backend.outputs.task-definition }}
          container-name: web
          image: ${{ steps.meta.outputs.web }}

      - name: Inject redis image
        id: render-cache
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: smarthr-taskdef-cache-revision2.json
          container-name: redis
          image: ${{ steps.meta.outputs.redis }}

      - name: Deploy cache
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.render-cache.outputs.task-definition }}
          service: smarthr-taskdef-cache-service
          cluster: smarthr-cluster
          wait-for-service-stability: true

      - name: Deploy app
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.render-app.outputs.task-definition }}
          service: smarthr-taskdef-app-service
          cluster: smarthr-cluster
          wait-for-service-stability: true