name: CI

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  actions: read
  contents: read

jobs:
  # ─────────────────────────────────────────────
  # 1. Build & Push Docker Images to ECR
  # ─────────────────────────────────────────────
  build-and-push:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: staging
    outputs:
      backend_image: ${{ steps.meta.outputs.backend_image }}
      web_image:     ${{ steps.meta.outputs.web_image }}
      agent_image:   ${{ steps.meta.outputs.agent_image }}
      redis_image:   ${{ steps.meta.outputs.redis_image }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── PHP / Composer ──────────────────────────────────────────────────
      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo_mysql, mbstring, bcmath, gd, zip
          tools: composer:v2

      - name: Install Composer dependencies (production)
        run: composer install --no-dev --optimize-autoloader --no-progress

      # ── Node / Vite ─────────────────────────────────────────────────────
      - name: Setup Node 18
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Build frontend assets (laravel-vite-plugin → public/build/)
        run: npm run build

      - name: Verify build output exists
        run: |
          echo "=== public/build/ contents ==="
          ls -la public/build/
          echo "=== manifest.json ==="
          cat public/build/manifest.json

      # ── Image tags ──────────────────────────────────────────────────────
      - name: Compute image tags
        id: meta
        run: |
          REGISTRY="${{ steps.login-ecr.outputs.registry }}"
          SHA="${{ github.sha }}"
          echo "backend_image=${REGISTRY}/smarthr-backend:${SHA}" >> "$GITHUB_OUTPUT"
          echo "web_image=${REGISTRY}/smarthr-web:${SHA}"         >> "$GITHUB_OUTPUT"
          echo "agent_image=${REGISTRY}/smarthr-agent:${SHA}"     >> "$GITHUB_OUTPUT"
          echo "redis_image=${REGISTRY}/smarthr-redis:${SHA}"     >> "$GITHUB_OUTPUT"

      # ── Docker builds ───────────────────────────────────────────────────
      # NOTE: cache is DISABLED on all images.
      # GHA cache can serve a stale layer that predates the npm build,
      # causing public/build/ to be missing inside the image.
      # Re-enable cache-from/cache-to only after confirming assets load.

      - name: Build & push backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfiles/app/backend/Dockerfile
          push: true
          provenance: false
          tags: |
            ${{ steps.meta.outputs.backend_image }}
            ${{ steps.login-ecr.outputs.registry }}/smarthr-backend:latest

      - name: Build & push web (Nginx) image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfiles/web/Dockerfile
          push: true
          provenance: false
          tags: |
            ${{ steps.meta.outputs.web_image }}
            ${{ steps.login-ecr.outputs.registry }}/smarthr-web:latest

      - name: Build & push agent image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfiles/agent/Dockerfile
          push: true
          provenance: false
          tags: |
            ${{ steps.meta.outputs.agent_image }}
            ${{ steps.login-ecr.outputs.registry }}/smarthr-agent:latest

      - name: Build & push redis image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfiles/cache/Dockerfile
          push: true
          provenance: false
          tags: |
            ${{ steps.meta.outputs.redis_image }}
            ${{ steps.login-ecr.outputs.registry }}/smarthr-redis:latest

  # ─────────────────────────────────────────────
  # 2. Deploy to ECS
  # ─────────────────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: staging

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Deploy app service (backend + web)
        run: |
          aws ecs update-service \
            --cluster smarthr \
            --service smarthr-app-service \
            --force-new-deployment \
            --region us-east-1

      - name: Deploy agent service
        run: |
          aws ecs update-service \
            --cluster smarthr \
            --service smarthr-agent-service \
            --force-new-deployment \
            --region us-east-1

      - name: Wait for app service to stabilize
        run: |
          aws ecs wait services-stable \
            --cluster smarthr \
            --services smarthr-app-service \
            --region us-east-1

      - name: Wait for agent service to stabilize
        run: |
          aws ecs wait services-stable \
            --cluster smarthr \
            --services smarthr-agent-service \
            --region us-east-1

      - name: Deployment summary
        run: |
          echo "✅ Deployment completed successfully"
          echo "Backend : ${{ needs.build-and-push.outputs.backend_image }}"
          echo "Web     : ${{ needs.build-and-push.outputs.web_image }}"
          echo "Agent   : ${{ needs.build-and-push.outputs.agent_image }}"
          echo "Redis   : ${{ needs.build-and-push.outputs.redis_image }}"