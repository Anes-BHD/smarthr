name: CI

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      PHP_CS_FIXER_IGNORE_ENV: 1

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 1

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'
        extensions: pdo_mysql, mbstring, exif, pcntl, bcmath, gd, zip, intl, opcache, redis
        tools: composer:v2

    - name: Cache Composer dependencies
      uses: actions/cache@v3
      with:
        path: vendor
        key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
        restore-keys: |
          ${{ runner.os }}-composer-

    - name: Cache Composer cache dir
      uses: actions/cache@v3
      with:
        path: ~/.composer/cache
        key: ${{ runner.os }}-composer-cache-${{ hashFiles('**/composer.lock') }}
        restore-keys: |
          ${{ runner.os }}-composer-cache-

    - name: Install Composer dependencies
      run: composer install --no-progress --prefer-dist --optimize-autoloader

    - name: Install Node dependencies
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'

    - name: Install frontend dependencies
      run: npm ci

    - name: Build assets
      run: npm run build --if-present

    - name: Setup Laravel environment
      run: |
        echo "APP_NAME=Smarthr" > .env
        echo "APP_ENV=testing" >> .env
        echo "APP_KEY=base64:$(openssl rand -base64 32)" >> .env
        echo "DB_CONNECTION=sqlite" >> .env
        echo "DB_DATABASE=:memory:" >> .env
        echo "CACHE_DRIVER=array" >> .env
        echo "SESSION_DRIVER=array" >> .env
        echo "QUEUE_CONNECTION=sync" >> .env

    - name: Run PHPUnit
      run: |
        mkdir -p test-results
        ./vendor/bin/phpunit --log-junit test-results/phpunit.xml

    - name: Upload PHPUnit results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: phpunit-results
        path: test-results

    # Docker image builds removed from the test job to speed up CI.
    # Image builds are handled in the deploy job where images are pushed to ECR.

    # Trivy scanning moved to a separate job to avoid slowing down test job.

  dependency-check:
    name: OWASP Dependency-Check
    runs-on: ubuntu-latest
    needs: test
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 1

    - name: Run OWASP Dependency-Check
      uses: dependency-check/Dependency-Check_Action@main
      id: owasp
      continue-on-error: true
      with:
        project: 'smarthr'
        path: '.'
        format: 'ALL'
        out: 'dependency-check-report'
        args: >
          --enableRetired
          --enableExperimental

    - name: Upload Dependency-Check report as artifact
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: dependency-check-report
        path: dependency-check-report

    - name: Upload SARIF to GitHub Security tab
      uses: github/codeql-action/upload-sarif@v4
      if: always()
      continue-on-error: true
      with:
        sarif_file: dependency-check-report/dependency-check-report.sarif

  build-and-push:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: staging
    outputs:
      backend_image: ${{ steps.meta.outputs.backend_image }}
      frontend_image: ${{ steps.meta.outputs.frontend_image }}
      db_image: ${{ steps.meta.outputs.db_image }}
      web_image: ${{ steps.meta.outputs.web_image }}
      redis_image: ${{ steps.meta.outputs.redis_image }}
 
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 1
 
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: 'us-east-1'
    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2
 
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

      # Install composer deps so vendor/ is present for the backend image
    - name: Setup PHP 8.2
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'
        extensions: pdo_mysql, mbstring, bcmath, gd, zip
        tools: composer:v2
 

    - name: Install Composer dependencies (production)
      run: composer install --no-dev --optimize-autoloader --no-progress
 
      # Build frontend assets before baking them into images
    - name: Setup Node 18
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'
 
    - name: Install & build frontend assets
      run: |
        npm ci
        npm run build --if-present
 

    # Emit image URIs for the deploy job
    - name: Compute image tags
      id: meta
      run: |
        REGISTRY="${{ steps.login-ecr.outputs.registry }}"
        REPO="smarthr"   
        SHA="${{ github.sha }}"
        echo "backend_image=${REGISTRY}/${REPO}:backend-${SHA}"   >> "$GITHUB_OUTPUT"
        echo "frontend_image=${REGISTRY}/${REPO}:frontend-${SHA}" >> "$GITHUB_OUTPUT"
        echo "db_image=${REGISTRY}/${REPO}:db-${SHA}"             >> "$GITHUB_OUTPUT"
        echo "web_image=${REGISTRY}/${REPO}:web-${SHA}"           >> "$GITHUB_OUTPUT"
        echo "redis_image=${REGISTRY}/${REPO}:redis-${SHA}"       >> "$GITHUB_OUTPUT"
 
    - name: Build & push backend image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfiles/app/backend/Dockerfile
        push: true
        tags: |
          ${{ steps.meta.outputs.backend_image }}
          ${{ steps.login-ecr.outputs.registry }}/smarthr:backend-latest
        cache-from: |
          type=gha
          ${{ steps.login-ecr.outputs.registry }}/smarthr:backend-latest
        cache-to: type=gha,mode=max
 
    - name: Build & push frontend image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfiles/app/frontend/Dockerfile
        push: true
        tags: |
          ${{ steps.meta.outputs.frontend_image }}
          ${{ steps.login-ecr.outputs.registry }}/smarthr:frontend-latest
        cache-from: type=gha
        cache-to: type=gha,mode=max
 
    - name: Build & push database image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfiles/db/Dockerfile
        push: true
        tags: |
          ${{ steps.meta.outputs.db_image }}
          ${{ steps.login-ecr.outputs.registry }}/smarthr:db-latest
        cache-from: type=gha
        cache-to: type=gha,mode=max
 
    - name: Build & push web (Nginx) image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfiles/web/Dockerfile
        push: true
        tags: |
          ${{ steps.meta.outputs.web_image }}
          ${{ steps.login-ecr.outputs.registry }}/smarthr:web-latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Build & push redis image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfiles/redis/Dockerfile
        push: true
        tags: |
          ${{ steps.meta.outputs.redis_image }}
          ${{ steps.login-ecr.outputs.registry }}/smarthr:redis-latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

  vulnerability-scan:
    name: Trivy Vulnerability Scan
    runs-on: ubuntu-latest
    needs: test
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 1

    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'

    - name: Upload Trivy scan results to GitHub Security tab
      uses: github/codeql-action/upload-sarif@v4
      if: always()
      with:
        sarif_file: 'trivy-results.sarif'