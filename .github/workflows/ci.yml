name: CI

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      PHP_CS_FIXER_IGNORE_ENV: 1

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 1

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'
        extensions: pdo_mysql, mbstring, exif, pcntl, bcmath, gd, zip, intl, opcache, redis
        tools: composer:v2

    - name: Cache Composer dependencies
      uses: actions/cache@v3
      with:
        path: vendor
        key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
        restore-keys: |
          ${{ runner.os }}-composer-

    - name: Cache Composer cache dir
      uses: actions/cache@v3
      with:
        path: ~/.composer/cache
        key: ${{ runner.os }}-composer-cache-${{ hashFiles('**/composer.lock') }}
        restore-keys: |
          ${{ runner.os }}-composer-cache-

    - name: Install Composer dependencies
      run: composer install --no-progress --prefer-dist --optimize-autoloader

    - name: Install Node dependencies
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'

    - name: Install frontend dependencies
      run: npm ci

    - name: Build assets
      run: npm run build --if-present

    - name: Setup Laravel environment
      run: |
        echo "APP_NAME=Smarthr" > .env
        echo "APP_ENV=testing" >> .env
        echo "APP_KEY=base64:$(openssl rand -base64 32)" >> .env
        echo "DB_CONNECTION=sqlite" >> .env
        echo "DB_DATABASE=:memory:" >> .env
        echo "CACHE_DRIVER=array" >> .env
        echo "SESSION_DRIVER=array" >> .env
        echo "QUEUE_CONNECTION=sync" >> .env

    - name: Run PHPUnit
      run: |
        mkdir -p test-results
        ./vendor/bin/phpunit --log-junit test-results/phpunit.xml

    - name: Upload PHPUnit results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: phpunit-results
        path: test-results

  dependency-check:
    name: OWASP Dependency-Check
    runs-on: ubuntu-latest
    needs: test
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 1

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Run OWASP Dependency-Check
      uses: dependency-check/Dependency-Check_Action@main
      id: owasp
      continue-on-error: true
      with:
        project: 'smarthr'
        path: '.'
        format: 'ALL'
        out: 'dependency-check-report'
        args: >
          --enableRetired
          --enableExperimental

    - name: Upload Dependency-Check report as artifact
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: dependency-check-report
        path: dependency-check-report

    - name: Upload SARIF to GitHub Security tab
      uses: github/codeql-action/upload-sarif@v4
      if: always()
      continue-on-error: true
      with:
        sarif_file: dependency-check-report/dependency-check-report.sarif

  vulnerability-scan:
    name: Trivy Vulnerability Scan
    runs-on: ubuntu-latest
    needs: test
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 1

    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'

    - name: Upload Trivy scan results to GitHub Security tab
      uses: github/codeql-action/upload-sarif@v4
      if: always()
      with:
        sarif_file: 'trivy-results.sarif'

  build-and-push:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: staging
    outputs:
      backend_image: ${{ steps.meta.outputs.backend_image }}
      web_image: ${{ steps.meta.outputs.web_image }}
      redis_image: ${{ steps.meta.outputs.redis_image }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 1

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: 'us-east-1'

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Setup PHP 8.2
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'
        extensions: pdo_mysql, mbstring, bcmath, gd, zip
        tools: composer:v2

    - name: Install Composer dependencies (production)
      run: composer install --no-dev --optimize-autoloader --no-progress

    - name: Setup Node 18
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'

    - name: Install & build frontend assets
      run: |
        npm ci
        npm run build --if-present

    - name: Compute image tags
      id: meta
      run: |
        REGISTRY="${{ steps.login-ecr.outputs.registry }}"
        REPO="smarthr"
        SHA="${{ github.sha }}"
        echo "backend_image=${REGISTRY}/${REPO}:backend-${SHA}" >> "$GITHUB_OUTPUT"
        echo "web_image=${REGISTRY}/${REPO}:web-${SHA}"         >> "$GITHUB_OUTPUT"
        echo "redis_image=${REGISTRY}/${REPO}:redis-${SHA}"     >> "$GITHUB_OUTPUT"

    - name: Build & push Redis image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfiles/cache/Dockerfile
        push: true
        tags: |
          ${{ steps.meta.outputs.redis_image }}
          ${{ steps.login-ecr.outputs.registry }}/smarthr:redis-latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Build & push backend image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfiles/app/backend/Dockerfile
        push: true
        tags: |
          ${{ steps.meta.outputs.backend_image }}
          ${{ steps.login-ecr.outputs.registry }}/smarthr:backend-latest
        cache-from: |
          type=gha
          ${{ steps.login-ecr.outputs.registry }}/smarthr:backend-latest
        cache-to: type=gha,mode=max

    - name: Build & push web (Nginx) image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfiles/web/Dockerfile
        push: true
        tags: |
          ${{ steps.meta.outputs.web_image }}
          ${{ steps.login-ecr.outputs.registry }}/smarthr:web-latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

  migrate:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: staging

    steps:
    - uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: 'us-east-1'

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Compute image tag
      id: meta
      run: |
        REGISTRY=${{ steps.login-ecr.outputs.registry }}
        echo "backend_image=$REGISTRY/smarthr:backend-${{ github.sha }}" >> $GITHUB_OUTPUT

    - name: Inject backend image into task definition
      id: render-migrate
      uses: aws-actions/amazon-ecs-render-task-definition@v1
      with:
        task-definition: smarthr-taskdef-app-revision2.json
        container-name: smarthr-backend
        image: ${{ steps.meta.outputs.backend_image }}

    - name: Register migrate task definition
      id: register-migrate-taskdef
      run: |
        cat ${{ steps.render-migrate.outputs.task-definition }} | \
          jq '
            .containerDefinitions |= map(select(.name == "smarthr-backend")) |
            .containerDefinitions[0].command = ["php", "artisan", "migrate", "--force", "--no-interaction"] |
            .containerDefinitions[0].environment += [
              {"name": "CACHE_STORE", "value": "array"},
              {"name": "SESSION_DRIVER", "value": "array"},
              {"name": "QUEUE_CONNECTION", "value": "sync"}
            ] |
            del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy, .tags)
          ' > /tmp/migrate-taskdef.json

        echo "--- Validating JSON ---"
        cat /tmp/migrate-taskdef.json | jq .

        TASK_DEF_ARN=$(aws ecs register-task-definition \
          --cli-input-json file:///tmp/migrate-taskdef.json \
          --query 'taskDefinition.taskDefinitionArn' \
          --output text)
        echo "task_def_arn=$TASK_DEF_ARN" >> $GITHUB_OUTPUT

    - name: Run migration task
      id: run-migrate
      run: |
        TASK_ARN=$(aws ecs run-task \
          --cluster smarthr-cluster \
          --task-definition ${{ steps.register-migrate-taskdef.outputs.task_def_arn }} \
          --launch-type FARGATE \
          --network-configuration '${{ secrets.ECS_NETWORK_CONFIG }}' \
          --query 'tasks[0].taskArn' \
          --output text)
        echo "task_arn=$TASK_ARN" >> $GITHUB_OUTPUT
        echo "Migration task started: $TASK_ARN"

    - name: Wait for migration task to complete
      run: |
        echo "Waiting for migration task to finish..."
        aws ecs wait tasks-stopped \
          --cluster smarthr-cluster \
          --tasks ${{ steps.run-migrate.outputs.task_arn }}

    - name: Check migration exit code
      run: |
        EXIT_CODE=$(aws ecs describe-tasks \
          --cluster smarthr-cluster \
          --tasks ${{ steps.run-migrate.outputs.task_arn }} \
          --query 'tasks[0].containers[0].exitCode' \
          --output text)
        echo "Migration exit code: $EXIT_CODE"
        if [ "$EXIT_CODE" != "0" ]; then
          echo "❌ Migration failed with exit code $EXIT_CODE"
          exit 1
        fi
        echo "✅ Migration completed successfully"

  deploy:
    runs-on: ubuntu-latest
    needs: migrate
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: staging

    steps:
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: 'us-east-1'

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - uses: actions/checkout@v4

    - name: Compute image tags
      id: meta
      run: |
        REGISTRY=${{ steps.login-ecr.outputs.registry }}
        REPO=smarthr
        SHA=${{ github.sha }}
        echo "backend_image=$REGISTRY/$REPO:backend-$SHA" >> $GITHUB_OUTPUT
        echo "web_image=$REGISTRY/$REPO:web-$SHA"         >> $GITHUB_OUTPUT
        echo "redis_image=$REGISTRY/$REPO:redis-$SHA"     >> $GITHUB_OUTPUT

    - name: Inject backend image
      id: render-backend
      uses: aws-actions/amazon-ecs-render-task-definition@v1
      with:
        task-definition: smarthr-taskdef-app-revision2.json
        container-name: smarthr-backend
        image: ${{ steps.meta.outputs.backend_image }}

    - name: Inject web image
      id: render-app
      uses: aws-actions/amazon-ecs-render-task-definition@v1
      with:
        task-definition: ${{ steps.render-backend.outputs.task-definition }}
        container-name: smarthr-web
        image: ${{ steps.meta.outputs.web_image }}

    - name: Render cache task definition
      id: render-cache
      uses: aws-actions/amazon-ecs-render-task-definition@v1
      with:
        task-definition: smarthr-taskdef-cache-revision2.json
        container-name: smarthr-cache
        image: ${{ steps.meta.outputs.redis_image }}

    - name: Deploy cache service
      uses: aws-actions/amazon-ecs-deploy-task-definition@v1
      with:
        task-definition: ${{ steps.render-cache.outputs.task-definition }}
        service: smarthr-taskdef-cache-service-jmpm422d
        cluster: smarthr-cluster
        wait-for-service-stability: true

    - name: Deploy app service
      uses: aws-actions/amazon-ecs-deploy-task-definition@v1
      with:
        task-definition: ${{ steps.render-app.outputs.task-definition }}
        service: smarthr-taskdef-app-service-uq1klkgk
        cluster: smarthr-cluster
        wait-for-service-stability: true

    - name: Deployment summary
      run: |
        echo "✅ Deployment completed successfully"
        echo "Backend image: ${{ steps.meta.outputs.backend_image }}"
        echo "Web image:     ${{ steps.meta.outputs.web_image }}"
        echo "Redis image:   ${{ steps.meta.outputs.redis_image }}"