#version: '3.8'

services:
  # Backend Service (Laravel PHP-FPM)
  backend:
    build:
      context: .
      dockerfile: Dockerfiles/app/backend/Dockerfile
    container_name: backend
    healthcheck:
      test: ["CMD", "php-fpm", "-t"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    restart: unless-stopped
    working_dir: /var/www/smartrh
    volumes:
      - ./:/var/www/smartrh
      - ./storage:/var/www/smartrh/storage
    networks:
      smartrh_network:
        aliases:
          - backend
    environment:
      - PHP_OPCACHE_VALIDATE_TIMESTAMPS=1
    depends_on:
      - db
      - redis
    user: "root"

 
  # Web Server (Nginx)
  web:
    build:
      context: .
      dockerfile: Dockerfiles/web/Dockerfile
    container_name: web
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/smartrh
      - ./Dockerfiles/web/nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - smartrh_network
    depends_on:
      backend:
        condition: service_healthy

  # Database Service (MySQL)
  db:
    build:
      context: .
      dockerfile: Dockerfiles/db/Dockerfile
    container_name: db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: smarthr
      MYSQL_USER: smarthr
      MYSQL_PASSWORD: password
      MYSQL_ROOT_PASSWORD: rootpassword
      SERVICE_TAGS: dev
      SERVICE_NAME: mysql
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - smartrh_network

  # Redis Service (for caching and sessions)
  redis:
    image: redis:alpine
    container_name: redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - smartrh_network

networks:
  smartrh_network:
    driver: bridge

volumes:
  db_data:
    driver: local
