#version: '3.8'

services:
  # Backend Service (Laravel PHP-FPM)
  backend:
    build:
      context: .
      dockerfile: Dockerfiles/app/backend/Dockerfile
    container_name: smartrh_backend
    restart: unless-stopped
    working_dir: /var/www/smartrh
    volumes:
      - ./app:/var/www/smartrh/app
      - ./bootstrap:/var/www/smartrh/bootstrap
      - ./config:/var/www/smartrh/config
      - ./database:/var/www/smartrh/database
      - ./lang:/var/www/smartrh/lang
      - ./resources:/var/www/smartrh/resources
      - ./routes:/var/www/smartrh/routes
      - ./Modules:/var/www/smartrh/Modules
      - ./public:/var/www/smartrh/public
      - ./storage:/var/www/smartrh/storage
      - ./vendor:/var/www/smartrh/vendor
      - ./.env:/var/www/smartrh/.env
      - ./composer.json:/var/www/smartrh/composer.json
      - ./composer.lock:/var/www/smartrh/composer.lock
      - ./artisan:/var/www/smartrh/artisan
    networks:
      smartrh_network:
        aliases:
          - backend
    environment:
      - PHP_OPCACHE_VALIDATE_TIMESTAMPS=1
    user: "www-data:www-data"
    depends_on:
      - redis

 
  # Web Server (Nginx)
  web:
    build:
      context: .
      dockerfile: Dockerfiles/web/Dockerfile
    container_name: smartrh_web
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/smartrh
      - ./Dockerfiles/web/nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - smartrh_network
    depends_on:
      - backend

  # Database Service (MySQL) - REMOVED: Using AWS RDS instead
  # Uncomment the db service below to use local MySQL for development
  # db:
  #   build:
  #     context: .
  #     dockerfile: Dockerfiles/db/Dockerfile
  #   container_name: smartrh_db
  #   restart: unless-stopped
  #   environment:
  #     MYSQL_DATABASE: smartrh
  #     MYSQL_ROOT_PASSWORD: root
  #     MYSQL_PASSWORD: password
  #     MYSQL_USER: smartrh
  #     SERVICE_TAGS: dev
  #     SERVICE_NAME: mysql
  #   volumes:
  #     - db_data:/var/lib/mysql
  #   ports:
  #     - "3306:3306"
  #   networks:
  #     - smartrh_network

  # Redis Service (for caching and sessions)
  redis:
    image: redis:alpine
    container_name: smartrh_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - smartrh_network

networks:
  smartrh_network:
    driver: bridge

