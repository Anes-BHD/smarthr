server {
    listen 80;
    server_name smarthr.anesbhd.com www.smarthr.anesbhd.com _;

    # ── React SPA root ────────────────────────────────────────────────────────
    root /var/www/smartrh/frontend/dist;
    index index.html;

    # ── Vite build assets (JS/CSS chunks with content-hash filenames) ─────────
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── Laravel API routes → PHP-FPM ─────────────────────────────────────────
    # Backend handles /api/*, /sanctum/*, /horizon/*, /telescope/*
    location ~ ^/(api|sanctum|horizon|telescope|up)(/|$) {
        root /var/www/smartrh/public;
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ── AI Agent proxy (FastAPI on port 8080) ──────────────────────────────────
    # Agent runs as a sidecar in the same ECS task — reachable on localhost.
    location /chatbot/ {
        proxy_pass http://127.0.0.1:8080/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache off;
        proxy_connect_timeout 10s;
        proxy_read_timeout    120s;
    }

    location ~ \.php$ {
        root /var/www/smartrh/public;
        # In Fargate awsvpc mode, sidecar containers share the task's
        # network namespace, so 127.0.0.1 correctly reaches PHP-FPM.
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;

        # Forward HTTPS scheme so Laravel detects HTTPS correctly behind ALB
        fastcgi_param HTTP_X_FORWARDED_PROTO $http_x_forwarded_proto;
        fastcgi_param HTTPS                  $http_x_forwarded_proto;

        fastcgi_read_timeout 300;
        fastcgi_connect_timeout 10;
    }

    # ── Laravel public assets (storage symlink, favicon, robots.txt) ──────────
    location /storage/ {
        root /var/www/smartrh/public;
        try_files $uri =404;
    }

    location = /favicon.ico { root /var/www/smartrh/public; access_log off; log_not_found off; }
    location = /robots.txt  { root /var/www/smartrh/public; access_log off; log_not_found off; }

    # ── Block hidden files ────────────────────────────────────────────────────
    location ~ /\.(?!well-known).* { deny all; }

    # ── React SPA — all other routes fall back to index.html ─────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    client_max_body_size 100M;
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    charset utf-8;
}