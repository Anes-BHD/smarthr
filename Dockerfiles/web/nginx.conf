server {
    listen 80;
    server_name smarthr.anesbhd.com www.smarthr.anesbhd.com _;

    root /var/www/smartrh/public;
    index index.php index.html;

    # ── Static assets (Vite build output) ──────────────────────────────────
    location /build/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── Public storage (uploaded files via storage:link) ────────────────────
    location /storage/ {
        try_files $uri =404;
    }

    # ── Favicon & robots ────────────────────────────────────────────────────
    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    # ── Block hidden files ───────────────────────────────────────────────────
    location ~ /\.(?!well-known).* { deny all; }

    # ── All other requests → SPA / Laravel ──────────────────────────────────
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ── PHP-FPM (backend sidecar, shares localhost in Fargate awsvpc) ────────
    location ~ \.php$ {
        # In Fargate awsvpc mode, sidecar containers share the task's
        # network namespace, so 127.0.0.1 correctly reaches PHP-FPM.
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;

        # Forward HTTPS scheme (ALB terminates TLS and sends this header)
        fastcgi_param HTTP_X_FORWARDED_PROTO $http_x_forwarded_proto;
        fastcgi_param HTTPS                  $http_x_forwarded_proto;

        fastcgi_read_timeout 300;
        fastcgi_connect_timeout 10;
    }

    client_max_body_size 100M;
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    charset utf-8;
}