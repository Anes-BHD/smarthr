server {
    listen 80;
    server_name smarthr.anesbhd.com www.smarthr.anesbhd.com;

    # ── React SPA (served from /app or just / depending on your setup) ──
    # Option A: React served at root /, Laravel API at /api
    root /var/www/smartrh/frontend;
    index index.html;

    # Serve React SPA — all non-API routes fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Laravel API ──
    location /api {
        root /var/www/smartrh/public;
        try_files $uri $uri/ /index.php?$query_string;

        location ~ \.php$ {
            fastcgi_pass 127.0.0.1:9000;
            fastcgi_param SCRIPT_FILENAME /var/www/smartrh/public$fastcgi_script_name;
            include fastcgi_params;
            fastcgi_param HTTP_X_FORWARDED_PROTO $http_x_forwarded_proto;
        }
    }

    # ── Laravel direct PHP files (storage links, etc.) ──
    location ~ \.php$ {
        root /var/www/smartrh/public;
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_param SCRIPT_FILENAME /var/www/smartrh/public$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_param HTTP_X_FORWARDED_PROTO $http_x_forwarded_proto;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }
    location ~ /\.(?!well-known).* { deny all; }

    client_max_body_size 100M;
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    charset utf-8;
}